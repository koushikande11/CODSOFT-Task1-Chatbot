<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}
h1{
color:#333;
}
.board{
display:grid;
grid-template-columns:repeat(3,100px);
grid-gap:5px;
justify-content:center;
margin-top:20px;
}
.cell{
width:100px;
height:100px;
font-size:40px;
background:white;
border:2px solid black;
cursor:pointer;
}
#status{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
button{
margin-top:20px;
padding:10px 20px;
font-size:18px;
}
</style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<div class="board">
<button class="cell" onclick="play(this,0)"></button>
<button class="cell" onclick="play(this,1)"></button>
<button class="cell" onclick="play(this,2)"></button>

<button class="cell" onclick="play(this,3)"></button>
<button class="cell" onclick="play(this,4)"></button>
<button class="cell" onclick="play(this,5)"></button>

<button class="cell" onclick="play(this,6)"></button>
<button class="cell" onclick="play(this,7)"></button>
<button class="cell" onclick="play(this,8)"></button>
</div>

<p id="status">Your Turn (X)</p>

<button onclick="location.reload()">Restart</button>

<script>
let board=["","","","","","","","",""];
let gameOver=false;

function play(cell,index){

if(board[index]!=""||gameOver)return;

board[index]="X";
cell.innerHTML="X";

if(checkWinner("X")){
document.getElementById("status").innerHTML="You Win!";
gameOver=true;
return;
}

if(board.every(x=>x!="")){
document.getElementById("status").innerHTML="Draw!";
gameOver=true;
return;
}

aiMove();
}

function aiMove(){

let empty=[];

for(let i=0;i<9;i++){
if(board[i]=="") empty.push(i);
}

let move=empty[Math.floor(Math.random()*empty.length)];

board[move]="O";

document.getElementsByClassName("cell")[move].innerHTML="O";

if(checkWinner("O")){
document.getElementById("status").innerHTML="AI Wins!";
gameOver=true;
return;
}

if(board.every(x=>x!="")){
document.getElementById("status").innerHTML="Draw!";
gameOver=true;
}

}

function checkWinner(player){

let win=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

return win.some(c=>
board[c[0]]==player &&
board[c[1]]==player &&
board[c[2]]==player
);

}
</script>

</body>
</html>
